<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deployment Overview — CEO OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1B4F8C; --primary-tint: #EAF2FF;
    --secondary: #2F8F5B; --secondary-tint: #E7F6EC;
    --bg: #FFFFFF; --bg-card: #F7F9FC; --border: #E5E9EF;
    --text: #10151D; --text-muted: #6B7686;
    --radius-card: 10px; --radius-btn: 6px; --radius-icon: 8px;
  }
  [data-theme="dark"] {
    --primary: #4A90D9; --primary-tint: #1A2533;
    --secondary: #52C57F; --secondary-tint: #16271E;
    --bg: #0E141C; --bg-card: #141C27; --border: #243042;
    --text: #F2F5F9; --text-muted: #8B97A8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  a { color: inherit; text-decoration: none; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 28px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .back-link { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  .back-link:hover { color: var(--primary); }
  .icon-btn { width: 34px; height: 34px; border-radius: var(--radius-btn); border: 1px solid var(--border); background: var(--bg-card); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); font-size: 15px; }
  .shell { max-width: 900px; margin: 0 auto; padding: 28px; }
  .page-head h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .page-head p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 8px 16px; }
  .deploy-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .deploy-row:last-child { border-bottom: none; }
  .deploy-left { display: flex; align-items: center; gap: 12px; }
  .deploy-icon { width: 32px; height: 32px; border-radius: var(--radius-icon); background: var(--secondary-tint); color: var(--secondary); display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .deploy-name { font-size: 13.5px; font-weight: 500; }
  .deploy-meta { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }
  .empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }
</style>
</head>
<body data-theme="light">
  <div class="topbar">
    <a href="../../index.html" class="back-link">← Back to CEO OS</a>
    <button class="icon-btn" id="themeToggle">☀</button>
  </div>
  <div class="shell">
    <div class="page-head">
      <h1>Deployment overview</h1>
      <p>Every Cloudflare Worker deployment across the platform.</p>
    </div>
    <div class="card" id="deployList"><div class="empty">Loading…</div></div>
  </div>

<script>
  const root = document.body;
  const toggle = document.getElementById('themeToggle');
  function applyTheme(t) { root.setAttribute('data-theme', t); toggle.textContent = t === 'dark' ? '☾' : '☀'; localStorage.setItem('sap-theme', t); }
  applyTheme(localStorage.getItem('sap-theme') || 'light');
  toggle.addEventListener('click', () => applyTheme(root.getAttribute('data-theme') === 'light' ? 'dark' : 'light'));

  const OPS_BASE = new URLSearchParams(location.search).get('ops') || 'https://platform-ops-connector.web-supplymate.workers.dev';

  function timeAgo(iso) {
    if (!iso) return '—';
    const diff = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 60) return `${mins}m ago`;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `${hours}h ago`;
    return `${Math.floor(hours / 24)}d ago`;
  }

  async function load() {
    try {
      const res = await fetch(`${OPS_BASE}/deployments`);
      const data = await res.json();
      const deployments = (data.deployments || []).sort((a, b) => (a.modifiedOn < b.modifiedOn ? 1 : -1));
      if (!deployments.length) { document.getElementById('deployList').innerHTML = '<div class="empty">No deployments found.</div>'; return; }
      document.getElementById('deployList').innerHTML = deployments.map(d => `
        <div class="deploy-row">
          <div class="deploy-left">
            <div class="deploy-icon">▲</div>
            <div>
              <div class="deploy-name">${d.name}</div>
              <div class="deploy-meta">${d.name}.web-supplymate.workers.dev</div>
            </div>
          </div>
          <div class="mono" style="font-size:12px; color:var(--text-muted);">deployed ${timeAgo(d.modifiedOn)}</div>
        </div>`).join('');
    } catch (err) {
      document.getElementById('deployList').innerHTML = '<div class="empty">Could not reach the Platform Ops Connector.</div>';
    }
  }
  load();
</script>
</body>
</html>
