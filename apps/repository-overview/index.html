<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repository Overview — CEO OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1B4F8C; --primary-tint: #EAF2FF;
    --secondary: #2F8F5B; --secondary-tint: #E7F6EC;
    --bg: #FFFFFF; --bg-card: #F7F9FC; --border: #E5E9EF;
    --text: #10151D; --text-muted: #6B7686;
    --radius-card: 10px; --radius-btn: 6px; --radius-icon: 8px;
  }
  [data-theme="dark"] {
    --primary: #4A90D9; --primary-tint: #1A2533;
    --secondary: #52C57F; --secondary-tint: #16271E;
    --bg: #0E141C; --bg-card: #141C27; --border: #243042;
    --text: #F2F5F9; --text-muted: #8B97A8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  a { color: inherit; text-decoration: none; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 28px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .back-link { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  .back-link:hover { color: var(--primary); }
  .icon-btn { width: 34px; height: 34px; border-radius: var(--radius-btn); border: 1px solid var(--border); background: var(--bg-card); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); font-size: 15px; }
  .shell { max-width: 1000px; margin: 0 auto; padding: 28px; }
  .page-head h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .page-head p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .repo-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 16px; margin-bottom: 12px; }
  .repo-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .repo-name { font-size: 14.5px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .lang-badge { font-size: 11px; background: var(--primary-tint); color: var(--primary); padding: 3px 9px; border-radius: 20px; }
  .repo-desc { font-size: 12.5px; color: var(--text-muted); margin-bottom: 10px; }
  .commit-row { display: flex; align-items: center; gap: 10px; font-size: 12.5px; padding-top: 10px; border-top: 1px solid var(--border); }
  .commit-sha { background: var(--secondary-tint); color: var(--secondary); padding: 2px 8px; border-radius: 6px; font-size: 11px; }
  .commit-msg { flex: 1; }
  .commit-meta { color: var(--text-muted); font-size: 11.5px; }
  .empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }
</style>
</head>
<body data-theme="light">
  <div class="topbar">
    <a href="../../index.html" class="back-link">← Back to CEO OS</a>
    <button class="icon-btn" id="themeToggle">☀</button>
  </div>
  <div class="shell">
    <div class="page-head">
      <h1>Repository overview</h1>
      <p>Every repository under websupplymate-ai, with its latest commit.</p>
    </div>
    <div id="repoList"><div class="empty">Loading…</div></div>
  </div>

<script>
  const root = document.body;
  const toggle = document.getElementById('themeToggle');
  function applyTheme(t) { root.setAttribute('data-theme', t); toggle.textContent = t === 'dark' ? '☾' : '☀'; localStorage.setItem('sap-theme', t); }
  applyTheme(localStorage.getItem('sap-theme') || 'light');
  toggle.addEventListener('click', () => applyTheme(root.getAttribute('data-theme') === 'light' ? 'dark' : 'light'));

  const OPS_BASE = new URLSearchParams(location.search).get('ops') || 'https://platform-ops-connector.web-supplymate.workers.dev';

  function timeAgo(iso) {
    if (!iso) return '—';
    const diff = Date.now() - new Date(iso).getTime();
    const days = Math.floor(diff / 86400000);
    if (days === 0) return 'today';
    if (days === 1) return '1 day ago';
    return `${days} days ago`;
  }

  async function load() {
    try {
      const res = await fetch(`${OPS_BASE}/repos`);
      const data = await res.json();
      const repos = data.repos || [];
      if (!repos.length) { document.getElementById('repoList').innerHTML = '<div class="empty">No repositories found.</div>'; return; }
      document.getElementById('repoList').innerHTML = repos.map(r => `
        <div class="repo-card">
          <div class="repo-head">
            <div class="repo-name">${r.name}${r.language ? `<span class="lang-badge">${r.language}</span>` : ''}</div>
            <a href="${r.url}" target="_blank" style="font-size:12px; color:var(--primary);">Open on GitHub →</a>
          </div>
          <div class="repo-desc">${r.description || 'No description'} · default branch: ${r.defaultBranch}</div>
          ${r.latestCommit ? `
          <div class="commit-row">
            <span class="commit-sha mono">${r.latestCommit.sha}</span>
            <span class="commit-msg">${r.latestCommit.message}</span>
            <span class="commit-meta">${r.latestCommit.author} · ${timeAgo(r.latestCommit.date)}</span>
          </div>` : `<div class="commit-row"><span class="commit-meta">No commits yet</span></div>`}
        </div>`).join('');
    } catch (err) {
      document.getElementById('repoList').innerHTML = '<div class="empty">Could not reach the Platform Ops Connector.</div>';
    }
  }
  load();
</script>
</body>
</html>
