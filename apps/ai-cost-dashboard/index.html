<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Cost Dashboard — CEO OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1B4F8C; --primary-tint: #EAF2FF;
    --secondary: #2F8F5B; --secondary-tint: #E7F6EC;
    --bg: #FFFFFF; --bg-card: #F7F9FC; --border: #E5E9EF;
    --text: #10151D; --text-muted: #6B7686;
    --radius-card: 10px; --radius-btn: 6px; --radius-icon: 8px;
  }
  [data-theme="dark"] {
    --primary: #4A90D9; --primary-tint: #1A2533;
    --secondary: #52C57F; --secondary-tint: #16271E;
    --bg: #0E141C; --bg-card: #141C27; --border: #243042;
    --text: #F2F5F9; --text-muted: #8B97A8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  a { color: inherit; text-decoration: none; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 28px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .back-link { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  .back-link:hover { color: var(--primary); }
  .icon-btn { width: 34px; height: 34px; border-radius: var(--radius-btn); border: 1px solid var(--border); background: var(--bg-card); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); font-size: 15px; }
  .shell { max-width: 900px; margin: 0 auto; padding: 28px; }
  .page-head h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .page-head p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 24px; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 16px; }
  .kpi-label { font-size: 12.5px; color: var(--text-muted); margin-bottom: 6px; }
  .kpi-value { font-size: 24px; font-weight: 600; }
  .section-title { font-size: 14px; font-weight: 600; margin: 24px 0 12px; }
  .bar-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
  .bar-row:last-child { border-bottom: none; }
  .bar-label { width: 130px; flex-shrink: 0; font-weight: 500; }
  .bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--primary); border-radius: 4px; }
  .bar-value { width: 90px; text-align: right; flex-shrink: 0; }
  .empty { text-align: center; padding: 30px; color: var(--text-muted); font-size: 13px; }
</style>
</head>
<body data-theme="light">
  <div class="topbar">
    <a href="../../index.html" class="back-link">← Back to CEO OS</a>
    <button class="icon-btn" id="themeToggle">☀</button>
  </div>
  <div class="shell">
    <div class="page-head">
      <h1>AI cost dashboard</h1>
      <p>Spend by provider and department, tracked automatically on every AI Router call.</p>
    </div>
    <div class="kpi-grid">
      <div class="card">
        <div class="kpi-label">Total AI spend (all time)</div>
        <div class="kpi-value mono" id="totalCost">—</div>
      </div>
      <div class="card">
        <div class="kpi-label">Total AI calls</div>
        <div class="kpi-value mono" id="totalCalls">—</div>
      </div>
    </div>
    <div class="section-title">Spend by department</div>
    <div class="card" id="byDept"><div class="empty">Loading…</div></div>
    <div class="section-title">Spend by provider</div>
    <div class="card" id="byProvider"></div>
  </div>

<script>
  const root = document.body;
  const toggle = document.getElementById('themeToggle');
  function applyTheme(t) { root.setAttribute('data-theme', t); toggle.textContent = t === 'dark' ? '☾' : '☀'; localStorage.setItem('sap-theme', t); }
  applyTheme(localStorage.getItem('sap-theme') || 'light');
  toggle.addEventListener('click', () => applyTheme(root.getAttribute('data-theme') === 'light' ? 'dark' : 'light'));

  const ROUTER_BASE = new URLSearchParams(location.search).get('router') || 'https://ai-router.web-supplymate.workers.dev';

  function renderBars(containerId, rows, labelKey, valueKey) {
    const max = Math.max(...rows.map(r => r[valueKey]), 0.0001);
    document.getElementById(containerId).innerHTML = rows.map(r => `
      <div class="bar-row">
        <div class="bar-label">${r[labelKey]}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(r[valueKey] / max) * 100}%"></div></div>
        <div class="bar-value mono">$${r[valueKey]}</div>
      </div>`).join('') || '<div class="empty">No spend recorded yet.</div>';
  }

  async function load() {
    try {
      const res = await fetch(`${ROUTER_BASE}/usage`);
      const data = await res.json();
      document.getElementById('totalCost').textContent = `$${(data.totals?.totalCostUsd || 0).toFixed(4)}`;
      document.getElementById('totalCalls').textContent = data.totals?.totalCalls || 0;
      renderBars('byDept', data.byDepartment || [], 'department', 'totalCostUsd');
      renderBars('byProvider', data.byProvider || [], 'provider', 'totalCostUsd');
    } catch (err) {
      document.getElementById('byDept').innerHTML = '<div class="empty">Could not reach the AI Router.</div>';
    }
  }
  load();
</script>
</body>
</html>
