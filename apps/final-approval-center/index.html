<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Approval Center — CEO OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1B4F8C; --primary-tint: #EAF2FF;
    --secondary: #2F8F5B; --secondary-tint: #E7F6EC;
    --bg: #FFFFFF; --bg-card: #F7F9FC; --border: #E5E9EF;
    --text: #10151D; --text-muted: #6B7686;
    --warn: #B7791F; --warn-tint: #FBF2E3;
    --danger: #C0392B; --danger-tint: #FBEAE8;
    --radius-card: 10px; --radius-btn: 6px; --radius-icon: 8px;
  }
  [data-theme="dark"] {
    --primary: #4A90D9; --primary-tint: #1A2533;
    --secondary: #52C57F; --secondary-tint: #16271E;
    --bg: #0E141C; --bg-card: #141C27; --border: #243042;
    --text: #F2F5F9; --text-muted: #8B97A8;
    --warn: #D9A441; --warn-tint: #241E12;
    --danger: #E0685A; --danger-tint: #2A1512;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  a { color: inherit; text-decoration: none; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 28px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .back-link { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  .back-link:hover { color: var(--primary); }
  .icon-btn { width: 34px; height: 34px; border-radius: var(--radius-btn); border: 1px solid var(--border); background: var(--bg-card); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); font-size: 15px; }
  .shell { max-width: 1100px; margin: 0 auto; padding: 28px; }
  .page-head h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .page-head p { font-size: 13px; color: var(--text-muted); }
  .filters { display: flex; gap: 8px; margin: 20px 0; }
  .filter-btn { font-size: 12.5px; font-weight: 500; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-muted); cursor: pointer; }
  .filter-btn.active { background: var(--primary-tint); color: var(--primary); border-color: transparent; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 8px 16px; }
  .approval-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); gap: 16px; }
  .approval-row:last-child { border-bottom: none; }
  .approval-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .approval-icon { width: 34px; height: 34px; border-radius: var(--radius-icon); background: var(--primary-tint); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .approval-title { font-size: 13.5px; font-weight: 500; }
  .approval-meta { font-size: 11.5px; color: var(--text-muted); margin-top: 3px; }
  .approval-right { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  .approval-amount { font-size: 13.5px; font-weight: 500; min-width: 90px; text-align: right; }
  .badge { font-size: 11px; font-weight: 500; padding: 4px 11px; border-radius: 20px; white-space: nowrap; }
  .badge-pending { background: var(--warn-tint); color: var(--warn); }
  .badge-approved { background: var(--secondary-tint); color: var(--secondary); }
  .badge-rejected { background: var(--danger-tint); color: var(--danger); }
  .badge-returned { background: var(--primary-tint); color: var(--primary); }
  .empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }
</style>
</head>
<body data-theme="light">
  <div class="topbar">
    <a href="../../index.html" class="back-link">← Back to CEO OS</a>
    <button class="icon-btn" id="themeToggle">☀</button>
  </div>
  <div class="shell">
    <div class="page-head">
      <h1>Final approval center</h1>
      <p>Every approval raised across the platform, in one place. Approve/reject actions route through each department's Operating System — this view is for oversight.</p>
    </div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="Pending">Pending</button>
      <button class="filter-btn" data-filter="Approved">Approved</button>
      <button class="filter-btn" data-filter="Rejected">Rejected</button>
      <button class="filter-btn" data-filter="Returned">Returned</button>
    </div>
    <div class="card" id="approvalsList"><div class="empty">Loading…</div></div>
  </div>

<script>
  const root = document.body;
  const toggle = document.getElementById('themeToggle');
  function applyTheme(t) { root.setAttribute('data-theme', t); toggle.textContent = t === 'dark' ? '☾' : '☀'; localStorage.setItem('sap-theme', t); }
  applyTheme(localStorage.getItem('sap-theme') || 'light');
  toggle.addEventListener('click', () => applyTheme(root.getAttribute('data-theme') === 'light' ? 'dark' : 'light'));

  const CONNECTOR_BASE = new URLSearchParams(location.search).get('connector') || 'https://platform-data-connector.web-supplymate.workers.dev';
  const BADGE_CLASS = { Pending: 'badge-pending', Approved: 'badge-approved', Rejected: 'badge-rejected', Returned: 'badge-returned' };
  let ALL_ROWS = [];

  function formatINR(n) {
    if (n === null || n === undefined) return '—';
    const abs = Math.abs(n);
    if (abs >= 1e7) return `₹${(n / 1e7).toFixed(2)} Cr`;
    if (abs >= 1e5) return `₹${(n / 1e5).toFixed(2)} L`;
    return `₹${n.toLocaleString('en-IN')}`;
  }

  function render(filter) {
    const rows = filter === 'all' ? ALL_ROWS : ALL_ROWS.filter(r => r.Status === filter);
    const el = document.getElementById('approvalsList');
    if (!rows.length) { el.innerHTML = '<div class="empty">No approvals match this filter.</div>'; return; }
    el.innerHTML = rows.map(r => `
      <div class="approval-row">
        <div class="approval-left">
          <div class="approval-icon">₹</div>
          <div>
            <div class="approval-title">${r.Title}</div>
            <div class="approval-meta">${r.Approval_ID} · ${r.Department} · ${r.Category} · requested ${r.Requested_Date}</div>
          </div>
        </div>
        <div class="approval-right">
          <div class="approval-amount mono">${formatINR(r.Amount)}</div>
          <span class="badge ${BADGE_CLASS[r.Status] || 'badge-pending'}">${r.Status}</span>
        </div>
      </div>`).join('');
  }

  document.getElementById('filters').addEventListener('click', (e) => {
    if (!e.target.classList.contains('filter-btn')) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    render(e.target.dataset.filter);
  });

  async function load() {
    try {
      const res = await fetch(`${CONNECTOR_BASE}/connector/ceo-os/Approvals_Queue`);
      const data = await res.json();
      ALL_ROWS = (data.rows || []).sort((a, b) => (a.Status === 'Pending' ? -1 : 1));
      render('all');
    } catch (err) {
      document.getElementById('approvalsList').innerHTML = '<div class="empty">Could not reach the Platform Data Connector.</div>';
    }
  }
  load();
</script>
</body>
</html>
